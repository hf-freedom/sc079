server.port=8004
spring.application.name=car-rental-system

# H2 Database Configuration (in-memory)
spring.datasource.url=jdbc:h2:mem:rentaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop

# Scheduling
spring.task.scheduling.pool.size=2

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Rental System Configuration
rental.violation-observation-days=7
rental.insurance-coverage-rate=0.8
rental.mileage-fee-per-km=0.5
rental.fuel-fee-per-liter=8.0
